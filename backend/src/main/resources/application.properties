# ─── Application ─────────────────────────────────────────────────────────────
spring.application.name=cicd-backend
server.port=8080

# ─── MySQL Connection ─────────────────────────────────────────────────────────
# DB_HOST defaults to "mysql" which is the Docker Compose service name.
# In a real AWS RDS setup, DB_HOST would be the RDS endpoint hostname.
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:cicddb}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:cicduser}
spring.datasource.password=${DB_PASSWORD:CicdPass2024!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── Connection Pool (HikariCP) ───────────────────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
# "update" creates tables automatically on first run and updates schema on changes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ─── App Info ────────────────────────────────────────────────────────────────
info.app.name=cicd-backend
info.app.version=1.0.0
info.app.description=Spring Boot backend with MySQL for AWS CI/CD Demo

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.demo.cicd=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
